services:
  # FastAPI Backend (includes ML engine + models)
  backend:
    build:
      context: .                  # Build context is the repo root
      dockerfile: backend/Dockerfile
    container_name: microgreens_backend
    environment:
      DATABASE_URL: sqlite:////app/data/microgreens.db
      API_HOST: 0.0.0.0
      API_PORT: 8000
      ALLOWED_ORIGINS: "*"
    volumes:
      - backend_static:/app/static
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # React Frontend (served via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: microgreens_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_static:
    driver: local
